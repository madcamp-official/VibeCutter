name: vibecutter-26s-w1-c3-04
services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: stockshorts
      MYSQL_ROOT_PASSWORD: p2-local-mysql-only
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - database-data:/var/lib/mysql
      - ../../.vibecutter/targets/sources/26s-w1-c3-04/backend/DB/stock-shorts-final.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../.vibecutter/targets/sources/26s-w1-c3-04/backend/DB/backend-seed_sectors.sql:/docker-entrypoint-initdb.d/02-sectors.sql:ro
      - ../../.vibecutter/targets/sources/26s-w1-c3-04/backend/DB/backend-seed_companies.sql:/docker-entrypoint-initdb.d/03-companies.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -uroot -pp2-local-mysql-only stockshorts -e 'SELECT 1 FROM Companies LIMIT 1; SELECT 1 FROM Sectors LIMIT 1;' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 36
    networks: [vibecutter-internal]
  backend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c3-04/backend
      dockerfile: ../../../../../targets/dockerfiles/26s-w1-c3-04.Dockerfile
      target: backend-runtime
    environment:
      PORT: "4000"
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: p2-local-mysql-only
      DB_NAME: stockshorts
      KIS_BASE_URL: http://127.0.0.1:9
      KIS_APP_KEY: ""
      KIS_APP_SECRET: ""
      GEMINI_API_KEY: ""
    depends_on: {database: {condition: service_healthy}}
    ports: ["127.0.0.1:14028:4000"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/devices',{method:'POST',headers:{'Content-Type':'application/json','X-Device-Id':'p2-health'},body:'{}'}).then(r=>process.exit(r.status===201?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 36
    networks: [vibecutter-internal]
  frontend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c3-04/frontend
      dockerfile: ../../../../../targets/dockerfiles/26s-w1-c3-04.Dockerfile
      target: frontend-runtime
      args:
        VITE_API_BASE_URL: /api
    volumes:
      - ../../targets/nginx/26s-w1-c3-04.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: {backend: {condition: service_healthy}}
    ports: ["127.0.0.1:14029:80"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ && wget -q -O- --header='X-Device-Id: p2-proxy-health' --header='Content-Type: application/json' --post-data='{}' http://127.0.0.1/api/devices >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [vibecutter-internal]
networks:
  vibecutter-internal:
    driver: bridge
    driver_opts: {com.docker.network.bridge.enable_ip_masquerade: "false"}
volumes:
  database-data:
