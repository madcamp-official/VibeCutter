name: vibecutter-26s-w1-c3-09

services:
  database:
    image: mysql:8.4
    restart: "no"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: roblox_rec
    command: [--character-set-server=utf8mb4, --collation-server=utf8mb4_0900_ai_ci]
    volumes:
      - database-data:/var/lib/mysql
      - ../../.vibecutter/targets/sources/26s-w1-c3-09/docs/schema/db-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../scripts/26s-w1-c3-09-seed.sql:/docker-entrypoint-initdb.d/02-p2-seed.sql:ro
    healthcheck:
      test: [CMD-SHELL, "mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [vibecutter-internal]

  server:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c3-09/backend
      dockerfile: ../../../../../targets/dockerfiles/26s-w1-c3-09-server.Dockerfile
    restart: "no"
    environment:
      DB_HOST: database
      DB_PORT: "3306"
      DB_PASSWORD: ""
      SERVER_PORT: "8080"
      GOOGLE_API_KEY: ""
    depends_on:
      database:
        condition: service_healthy
    ports: ["127.0.0.1:14036:8080"]
    healthcheck:
      test: [CMD-SHELL, "curl -fsS http://127.0.0.1:8080/api/health | grep -q '\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 36
    networks: [vibecutter-internal]

  frontend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c3-09/frontend
      dockerfile: ../../../../../targets/dockerfiles/26s-w1-c3-09-frontend.Dockerfile
    restart: "no"
    volumes:
      - ../nginx/26s-w1-c3-09.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
    ports: ["127.0.0.1:14037:80"]
    healthcheck:
      test: [CMD-SHELL, "wget -q --spider http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 18
    networks: [vibecutter-internal]

networks:
  vibecutter-internal:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"

volumes:
  database-data:
