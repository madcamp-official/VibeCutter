name: vibecutter-26s-w1-c2-04
services:
  api:
    image: vibecutter-26s-w1-c2-04-api:latest
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c2-04
      dockerfile: ../../../../targets/dockerfiles/26s-w1-c2-04.Dockerfile
      target: api-runtime
    ports: ["127.0.0.1:14017:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/data')"]
      interval: 5s
      timeout: 3s
      retries: 24
    networks: [vibecutter-internal]
  frontend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c2-04
      dockerfile: ../../../../targets/dockerfiles/26s-w1-c2-04.Dockerfile
      target: frontend-runtime
      args: {VITE_API_URL: /api}
    volumes: [../../targets/nginx/26s-w1-c2-04.conf:/etc/nginx/conf.d/default.conf:ro]
    depends_on: {api: {condition: service_healthy}}
    ports: ["127.0.0.1:14018:80"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [vibecutter-internal]
networks:
  vibecutter-internal:
    driver: bridge
    driver_opts: {com.docker.network.bridge.enable_ip_masquerade: "false"}
