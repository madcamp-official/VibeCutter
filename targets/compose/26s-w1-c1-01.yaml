name: vibecutter-26s-w1-c1-01

services:
  database:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_DB: vibecutter
      POSTGRES_USER: vibecutter
      POSTGRES_PASSWORD: vibecutter-local-only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibecutter -d vibecutter"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - database-data:/var/lib/postgresql/data
    networks: [vibecutter-internal]

  backend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c1-01
      dockerfile: Dockerfile
    restart: "no"
    environment:
      PORT: "4000"
      DATABASE_URL: postgresql://vibecutter:vibecutter-local-only@database:5432/vibecutter
      FRONTEND_ORIGIN: http://127.0.0.1:14002
      PYTHON_BIN: python3
      DATA_PIPELINE_DIR: /app/data-pipeline
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "127.0.0.1:14001:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [vibecutter-internal]

  frontend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c1-01/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:14001
    restart: "no"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:14002:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [vibecutter-internal]

networks:
  vibecutter-internal:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"

volumes:
  database-data:
