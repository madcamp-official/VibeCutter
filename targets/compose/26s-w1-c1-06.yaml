name: vibecutter-26s-w1-c1-06

services:
  database:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_DB: latestock
      POSTGRES_USER: vibecutter
      POSTGRES_PASSWORD: ${VIBECUTTER_26S_W1_C1_06_DB_PASSWORD:?set a local test value before starting}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibecutter -d latestock"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - database-data:/var/lib/postgresql/data
    networks: [vibecutter-internal]

  schema:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c1-06
      dockerfile: ../../../../targets/dockerfiles/26s-w1-c1-06.Dockerfile
      target: workspace
    restart: "no"
    command: [npm, run, db:apply-schema, --workspace, "@latestock/api"]
    environment:
      DATABASE_URL: postgresql://vibecutter:${VIBECUTTER_26S_W1_C1_06_DB_PASSWORD}@database:5432/latestock
    depends_on:
      database:
        condition: service_healthy
    networks: [vibecutter-internal]

  api:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c1-06
      dockerfile: ../../../../targets/dockerfiles/26s-w1-c1-06.Dockerfile
      target: api-runtime
    restart: "no"
    environment:
      PORT: "4000"
      JWT_SECRET: ${VIBECUTTER_26S_W1_C1_06_JWT_SECRET:?set a local test value before starting}
      JWT_EXPIRES_IN: 1h
      DATABASE_URL: postgresql://vibecutter:${VIBECUTTER_26S_W1_C1_06_DB_PASSWORD}@database:5432/latestock
      CORS_ORIGIN: http://127.0.0.1:14009
    depends_on:
      schema:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:14008:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 24
    networks: [vibecutter-internal]

  frontend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c1-06
      dockerfile: ../../../../targets/dockerfiles/26s-w1-c1-06.Dockerfile
      target: web-runtime
      args:
        VITE_API_BASE_URL: ""
        VITE_KAKAO_JS_KEY: local-test-only-kakao-key
    restart: "no"
    volumes:
      - ../../targets/nginx/26s-w1-c1-06.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:14009:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [vibecutter-internal]

  test:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c1-06
      dockerfile: ../../../../targets/dockerfiles/26s-w1-c1-06.Dockerfile
      target: workspace
    profiles: [test]
    command: [npm, run, test]
    networks: [vibecutter-internal]

networks:
  vibecutter-internal:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"

volumes:
  database-data:
