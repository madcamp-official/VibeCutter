name: vibecutter-26s-w1-c1-04

services:
  app:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c1-04/업데이트 모델
      dockerfile: ../../../../../targets/dockerfiles/26s-w1-c1-04.Dockerfile
    restart: "no"
    environment:
      PORT: "3000"
    ports:
      - "127.0.0.1:14004:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/leaderboard').then(r => process.exit(r.status === 200 ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [vibecutter-internal]

networks:
  vibecutter-internal:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"
