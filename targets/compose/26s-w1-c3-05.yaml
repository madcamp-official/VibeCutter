name: vibecutter-26s-w1-c3-05
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: myocatmongo
      POSTGRES_PASSWORD: myocatmongo
      POSTGRES_DB: myocatmongo
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myocatmongo -d myocatmongo"]
      interval: 5s
      timeout: 3s
      retries: 36
    networks: [vibecutter-internal]
  backend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c3-05/backend
    command: sh -c "node dist/src/db/migrate.js && node dist/src/db/seed.js && node dist/src/server.js"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://myocatmongo:myocatmongo@postgres:5432/myocatmongo
      PORT: "4000"
      PUBLIC_BASE_URL: http://backend:4000
      ASSET_PUBLIC_BASE_URL: http://127.0.0.1:14030
      CORS_ORIGIN: http://127.0.0.1:14031,http://localhost:14031
      JWT_SECRET: p2-local-runtime-only
      GOOGLE_CLIENT_ID: p2-local-google-client.apps.googleusercontent.com
      VISION_PROVIDER: mock
      VISION_SERVICE_URL: http://127.0.0.1:9
      VISION_HTTP_FALLBACK_TO_MOCK: "true"
      MAIL_PROVIDER: mock
      MAIL_APP_NAME: myocatmongo-p2
      MAIL_FROM: myocatmongo-p2 <no-reply@localhost>
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
    depends_on: {postgres: {condition: service_healthy}}
    volumes: [backend-uploads:/app/uploads]
    ports: ["127.0.0.1:14030:4000"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 36
    networks: [vibecutter-internal]
  frontend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c3-05/frontend
      dockerfile: ../../../../../targets/dockerfiles/26s-w1-c3-05-frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_GOOGLE_CLIENT_ID: p2-local-google-client.apps.googleusercontent.com
        VITE_KAKAO_REST_API_KEY: p2-local-kakao-key
        VITE_KAKAO_REDIRECT_URI: http://127.0.0.1:14031/oauth/kakao/callback
    volumes:
      - ../../targets/nginx/26s-w1-c3-05.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: {backend: {condition: service_healthy}}
    ports: ["127.0.0.1:14031:80"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ && wget -q -O- http://127.0.0.1/api/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [vibecutter-internal]
networks:
  vibecutter-internal:
    driver: bridge
    driver_opts: {com.docker.network.bridge.enable_ip_masquerade: "false"}
volumes:
  postgres-data:
  backend-uploads:
