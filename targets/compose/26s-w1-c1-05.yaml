name: vibecutter-26s-w1-c1-05

services:
  database:
    image: mysql:8.4
    restart: "no"
    environment:
      MYSQL_DATABASE: scrum_helper
      MYSQL_USER: vibecutter
      MYSQL_PASSWORD: ${VIBECUTTER_26S_W1_C1_05_DB_PASSWORD:?set a local test value before starting}
      MYSQL_ROOT_PASSWORD: ${VIBECUTTER_26S_W1_C1_05_ROOT_PASSWORD:?set a local test value before starting}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 3s
      retries: 24
    volumes:
      - database-data:/var/lib/mysql
    networks: [vibecutter-internal]

  app:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c1-05/backend
      dockerfile: ../../../../../targets/dockerfiles/26s-w1-c1-05.Dockerfile
      target: backend-runtime
    restart: "no"
    environment:
      SERVER_ADDRESS: 0.0.0.0
      DB_URL: jdbc:mysql://database:3306/scrum_helper?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      DB_USERNAME: vibecutter
      DB_PASSWORD: ${VIBECUTTER_26S_W1_C1_05_DB_PASSWORD}
      JPA_DDL_AUTO: update
      JWT_SECRET: ${VIBECUTTER_26S_W1_C1_05_JWT_SECRET:?set a local test value before starting}
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:14007
      GEMINI_API_KEY: ""
      GOOGLE_API_KEY: ""
      GEMINI_BASE_URL: http://gemini.invalid/v1beta
      GEMINI_UPLOAD_BASE_URL: http://gemini.invalid/upload/v1beta
      AI_TODO_PROMPT_REMOTE_ENABLED: "false"
      AI_TASK_RECOMMENDATION_REMOTE_ENABLED: "false"
      AI_TASK_SUGGESTION_REMOTE_ENABLED: "false"
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "127.0.0.1:14006:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 24
    networks: [vibecutter-internal]

  frontend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c1-05/frontend
      dockerfile: ../../../../../targets/dockerfiles/26s-w1-c1-05.Dockerfile
      target: frontend-runtime
      args:
        VITE_API_BASE_URL: http://127.0.0.1:14006/api
    restart: "no"
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:14007:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [vibecutter-internal]

  test:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c1-05/backend
      dockerfile: ../../../../../targets/dockerfiles/26s-w1-c1-05.Dockerfile
      target: backend-build
    profiles: [test]
    command: [gradle, --no-daemon, test]
    networks: [vibecutter-internal]

networks:
  vibecutter-internal:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"

volumes:
  database-data:
