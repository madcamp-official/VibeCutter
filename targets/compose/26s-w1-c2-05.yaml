name: vibecutter-26s-w1-c2-05
services:
  api:
    image: vibecutter-26s-w1-c2-05-api:latest
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c2-05
      dockerfile: ../../../../targets/dockerfiles/26s-w1-c2-05.Dockerfile
      target: api-runtime
    environment:
      GOOGLE_API_KEY: not-a-real-key
      GEMINI_API_KEY: not-a-real-key
      SECRET_KEY: p2-local-runtime-only
    ports: ["127.0.0.1:14019:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 5s
      timeout: 3s
      retries: 24
    networks: [vibecutter-internal]
  frontend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c2-05
      dockerfile: ../../../../targets/dockerfiles/26s-w1-c2-05.Dockerfile
      target: frontend-runtime
      args: {VITE_API_BASE_URL: /api}
    volumes: [../../targets/nginx/26s-w1-c2-05.conf:/etc/nginx/conf.d/default.conf:ro]
    depends_on: {api: {condition: service_healthy}}
    ports: ["127.0.0.1:14020:80"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [vibecutter-internal]
networks:
  vibecutter-internal:
    driver: bridge
    driver_opts: {com.docker.network.bridge.enable_ip_masquerade: "false"}
