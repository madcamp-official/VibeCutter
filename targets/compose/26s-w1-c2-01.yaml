name: vibecutter-26s-w1-c2-01

services:
  database:
    image: pgvector/pgvector:pg16
    restart: "no"
    environment:
      POSTGRES_DB: comind
      POSTGRES_USER: vibecutter
      POSTGRES_PASSWORD: ${VIBECUTTER_26S_W1_C2_01_DB_PASSWORD:?set a local test value before starting}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibecutter -d comind"]
      interval: 5s
      timeout: 3s
      retries: 24
    volumes:
      - database-data:/var/lib/postgresql/data
      - ../../.vibecutter/targets/sources/26s-w1-c2-01/backend/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [vibecutter-internal]

  redis:
    image: redis:7-alpine
    restart: "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 24
    volumes:
      - redis-data:/data
    networks: [vibecutter-internal]

  schema:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c2-01/backend
      dockerfile: Dockerfile
    restart: "no"
    command: [alembic, upgrade, head]
    environment:
      DATABASE_URL: postgresql+asyncpg://vibecutter:${VIBECUTTER_26S_W1_C2_01_DB_PASSWORD}@database:5432/comind
    depends_on:
      database:
        condition: service_healthy
    networks: [vibecutter-internal]

  api:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c2-01/backend
      dockerfile: Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: postgresql+asyncpg://vibecutter:${VIBECUTTER_26S_W1_C2_01_DB_PASSWORD}@database:5432/comind
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET_KEY: local-test-only-jwt-secret
      CORS_ALLOW_ORIGINS: http://127.0.0.1:14012
      GEMINI_API_KEY: ""
      GEMINI_MODEL: ""
      GEMINI_FALLBACK_MODELS: ""
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      schema:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:14011:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; raise SystemExit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready').status == 200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 24
    networks: [vibecutter-internal]

  frontend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c2-01/frontend
      dockerfile: ../../../../../targets/dockerfiles/26s-w1-c2-01-frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    restart: "no"
    volumes:
      - ../../targets/nginx/26s-w1-c2-01.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:14012:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [vibecutter-internal]

  test:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c2-01/backend
      dockerfile: Dockerfile
    profiles: [test]
    command: [python, -m, compileall, -q, app]
    networks: [vibecutter-internal]

networks:
  vibecutter-internal:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"

volumes:
  database-data:
  redis-data:
