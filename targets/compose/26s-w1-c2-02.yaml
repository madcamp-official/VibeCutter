name: vibecutter-26s-w1-c2-02
services:
  database:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_DB: campus_wakppuball
      POSTGRES_USER: vibecutter
      POSTGRES_PASSWORD: ${VIBECUTTER_26S_W1_C2_02_DB_PASSWORD:?set a local test value before starting}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibecutter -d campus_wakppuball"]
      interval: 5s
      timeout: 3s
      retries: 24
    volumes: [database-data:/var/lib/postgresql/data]
    networks: [vibecutter-internal]
  schema:
    image: vibecutter-26s-w1-c2-02-api:latest
    command: [npx, prisma, migrate, deploy, --schema, backend/prisma/schema.prisma]
    environment:
      DATABASE_URL: postgresql://vibecutter:${VIBECUTTER_26S_W1_C2_02_DB_PASSWORD}@database:5432/campus_wakppuball
    depends_on: {database: {condition: service_healthy}}
    networks: [vibecutter-internal]
  api:
    image: vibecutter-26s-w1-c2-02-api:latest
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c2-02
      dockerfile: ../../../../targets/dockerfiles/26s-w1-c2-02.Dockerfile
      target: api-runtime
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://vibecutter:${VIBECUTTER_26S_W1_C2_02_DB_PASSWORD}@database:5432/campus_wakppuball
      JWT_SECRET: local-test-only-jwt-secret
    depends_on: {schema: {condition: service_completed_successfully}}
    ports: ["127.0.0.1:14013:3000"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 24
    networks: [vibecutter-internal]
  frontend:
    build:
      context: ../../.vibecutter/targets/sources/26s-w1-c2-02
      dockerfile: ../../../../targets/dockerfiles/26s-w1-c2-02.Dockerfile
      target: frontend-runtime
      args: {VITE_API_BASE_URL: /api, VITE_ENABLE_MOCKS: "false"}
    volumes: [../../targets/nginx/26s-w1-c2-02.conf:/etc/nginx/conf.d/default.conf:ro]
    depends_on: {api: {condition: service_healthy}}
    ports: ["127.0.0.1:14014:80"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [vibecutter-internal]
  test:
    image: vibecutter-26s-w1-c2-02-api:latest
    profiles: [test]
    command: [npm, run, build:backend]
    networks: [vibecutter-internal]
networks:
  vibecutter-internal:
    driver: bridge
    driver_opts: {com.docker.network.bridge.enable_ip_masquerade: "false"}
volumes: {database-data: {}}
