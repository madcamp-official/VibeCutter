manifest_version: 1
id: 26s-w1-c3-03
display_name: 26s-w1-c3-03 local isolated runtime
adapter: node
source_dir: .vibecutter/targets/sources/26s-w1-c3-03
base_url: http://127.0.0.1:14027
commands:
  build: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-03.yaml, build], working_dir: ., timeout_seconds: 900}
  start: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-03.yaml, up, -d, --wait], working_dir: ., timeout_seconds: 180}
  stop: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-03.yaml, down, --remove-orphans], working_dir: ., timeout_seconds: 180}
  reset: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-03.yaml, down, --volumes, --remove-orphans], working_dir: ., timeout_seconds: 180}
  smoke: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-03.yaml, exec, -T, app, node, /opt/vibecutter/26s-w1-c3-03-smoke.js], working_dir: ., timeout_seconds: 60}
tool_versions: {docker: "29.6.1", docker-compose: "v5.3.0", node: "22-alpine"}
healthcheck: {path: /, expected_status: 200, timeout_seconds: 60}
reset: {command_id: reset, snapshot_name: node-memory-only-v1}
role_fixtures:
  - name: colormaster_local_socket_players
    description: Two ephemeral Socket.IO users exercise room create, validate, join, and ready transitions. Firebase Admin service account is intentionally absent; DB and Storage APIs return 503 under local isolation.
    # Firebase Admin is deliberately absent in the local Socket.IO fixture.
    secret_env_names: []
test_suites:
  - name: colormaster-socket-smoke
    command_id: smoke
log_paths: []
docker_isolation: {compose_file: targets/compose/26s-w1-c3-03.yaml, internal_network: vibecutter-internal, require_loopback_port_bindings: true}
