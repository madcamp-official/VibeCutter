manifest_version: 1
id: 26s-w1-c2-08
display_name: 26s-w1-c2-08 local isolated runtime
adapter: generic-docker
source_dir: .vibecutter/targets/sources/26s-w1-c2-08
base_url: http://127.0.0.1:14023
commands:
  build: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-08.yaml, build], working_dir: ., timeout_seconds: 1800}
  start: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-08.yaml, up, -d, --wait], working_dir: ., timeout_seconds: 360}
  stop: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-08.yaml, down, --remove-orphans], working_dir: ., timeout_seconds: 180}
  reset: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-08.yaml, down, --volumes, --remove-orphans], working_dir: ., timeout_seconds: 180}
tool_versions: {docker: "29.6.1", docker-compose: "v5.3.0", python: "3.13", node: "22", sqlite: "3"}
healthcheck: {path: /api/health/, expected_status: 200, timeout_seconds: 90}
reset: {command_id: reset, snapshot_name: source-sqlite-ephemeral-v1}
role_fixtures:
  - name: ggultem_source_sqlite
    description: Source SQLite database is copied into the ephemeral API container and reset by container removal; Gemini vision is unavailable under egress blocking.
    # Gemini vision is intentionally unavailable under egress blocking.
    secret_env_names: []
test_suites: []
log_paths: []
docker_isolation: {compose_file: targets/compose/26s-w1-c2-08.yaml, internal_network: vibecutter-internal, require_loopback_port_bindings: true}
