manifest_version: 1
id: 26s-w1-c3-06
display_name: 26s-w1-c3-06 local isolated runtime
adapter: fastapi
source_dir: .vibecutter/targets/sources/26s-w1-c3-06
base_url: http://127.0.0.1:14032
commands:
  build: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-06.yaml, build], working_dir: ., timeout_seconds: 1800}
  start: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-06.yaml, up, -d, --wait], working_dir: ., timeout_seconds: 480}
  stop: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-06.yaml, down, --remove-orphans], working_dir: ., timeout_seconds: 180}
  reset: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-06.yaml, down, --volumes, --remove-orphans], working_dir: ., timeout_seconds: 180}
  smoke: {argv: ["{vibecutter_python}", targets/scripts/26s-w1-c3-06-smoke.py], working_dir: ., timeout_seconds: 60}
tool_versions: {docker: "29.6.1", docker-compose: "v5.3.0", python: "3.13", postgres: "16", nginx: "1.27-alpine"}
healthcheck: {path: "/auth/check-id?id=p2-health", expected_status: 200, timeout_seconds: 180}
reset: {command_id: reset, snapshot_name: local-postgres-seeded-v1}
role_fixtures:
  - name: mockinvest_ephemeral_user
    description: Fresh PostgreSQL volume is initialized from source SQLAlchemy models and source stock/news/price/quiz seed scripts. Smoke creates an ephemeral local user and verifies signup/login/account/stock list through loopback API and nginx proxy.
    secret_env_names: []
test_suites:
  - name: mockinvest-api-smoke
    command_id: smoke
log_paths: []
docker_isolation: {compose_file: targets/compose/26s-w1-c3-06.yaml, internal_network: vibecutter-internal, require_loopback_port_bindings: true}
