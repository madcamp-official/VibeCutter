manifest_version: 1
id: 26s-w1-c1-07
display_name: 26s-w1-c1-07 local isolated runtime
adapter: node
source_dir: .vibecutter/targets/sources/26s-w1-c1-07
base_url: http://127.0.0.1:14010
commands:
  build:
    argv: [docker, compose, --profile, test, -f, targets/compose/26s-w1-c1-07.yaml, build]
    working_dir: .
    timeout_seconds: 1800
  start:
    argv: [docker, compose, -f, targets/compose/26s-w1-c1-07.yaml, up, -d, --wait]
    working_dir: .
    timeout_seconds: 300
  stop:
    argv: [docker, compose, -f, targets/compose/26s-w1-c1-07.yaml, down, --remove-orphans]
    working_dir: .
    timeout_seconds: 180
  reset:
    argv: [docker, compose, -f, targets/compose/26s-w1-c1-07.yaml, down, --volumes, --remove-orphans]
    working_dir: .
    timeout_seconds: 180
  node_regression:
    argv: [docker, compose, --profile, test, -f, targets/compose/26s-w1-c1-07.yaml, run, --rm, --no-deps, test]
    working_dir: .
    timeout_seconds: 900
tool_versions:
  docker: "29.6.1"
  docker-compose: "v5.3.0"
  node: "22"
  mysql: "8.0"
healthcheck:
  path: /api/health
  expected_status: 200
  timeout_seconds: 90
reset:
  command_id: reset
  snapshot_name: local-mysql-ephemeral-v1
role_fixtures:
  - name: madcade_local_runtime
    description: Local MySQL migration and idempotent game/score seed; Google OAuth is intentionally not exercised.
    secret_env_names: [VIBECUTTER_26S_W1_C1_07_MYSQL_ROOT_PASSWORD, VIBECUTTER_26S_W1_C1_07_MYSQL_PASSWORD]
test_suites:
  - name: node-monorepo-regression
    command_id: node_regression
log_paths: []
docker_isolation:
  compose_file: targets/compose/26s-w1-c1-07.yaml
  internal_network: vibecutter-internal
  require_loopback_port_bindings: true
