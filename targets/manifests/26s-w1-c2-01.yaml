manifest_version: 1
id: 26s-w1-c2-01
display_name: 26s-w1-c2-01 local isolated runtime
adapter: fastapi
source_dir: .vibecutter/targets/sources/26s-w1-c2-01
base_url: http://127.0.0.1:14011
commands:
  build:
    argv: [docker, compose, --profile, test, -f, targets/compose/26s-w1-c2-01.yaml, build]
    working_dir: .
    timeout_seconds: 1800
  start:
    argv: [docker, compose, -f, targets/compose/26s-w1-c2-01.yaml, up, -d, --wait]
    working_dir: .
    timeout_seconds: 360
  stop:
    argv: [docker, compose, -f, targets/compose/26s-w1-c2-01.yaml, down, --remove-orphans]
    working_dir: .
    timeout_seconds: 180
  reset:
    argv: [docker, compose, -f, targets/compose/26s-w1-c2-01.yaml, down, --volumes, --remove-orphans]
    working_dir: .
    timeout_seconds: 180
  python_regression:
    argv: [docker, compose, --profile, test, -f, targets/compose/26s-w1-c2-01.yaml, run, --rm, --no-deps, test]
    working_dir: .
    timeout_seconds: 600
tool_versions:
  docker: "29.6.1"
  docker-compose: "v5.3.0"
  python: "3.12"
  postgresql: "16-pgvector"
  redis: "7"
healthcheck:
  path: /api/v1/health/ready
  expected_status: 200
  timeout_seconds: 90
reset:
  command_id: reset
  snapshot_name: local-postgres-redis-ephemeral-v1
role_fixtures:
  - name: comind_local_runtime
    description: Local PostgreSQL and Redis only; Gemini worker/recommendation calls are disabled.
    secret_env_names: [VIBECUTTER_26S_W1_C2_01_DB_PASSWORD]
test_suites:
  - name: fastapi-compile-regression
    command_id: python_regression
log_paths: []
docker_isolation:
  compose_file: targets/compose/26s-w1-c2-01.yaml
  internal_network: vibecutter-internal
  require_loopback_port_bindings: true
