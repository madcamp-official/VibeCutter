manifest_version: 1
id: 26s-w1-c1-05
display_name: 26s-w1-c1-05 local isolated runtime
adapter: spring-boot
source_dir: .vibecutter/targets/sources/26s-w1-c1-05/backend
base_url: http://127.0.0.1:14006
commands:
  build:
    argv: [docker, compose, --profile, test, -f, targets/compose/26s-w1-c1-05.yaml, build]
    working_dir: .
    timeout_seconds: 1800
  start:
    argv: [docker, compose, -f, targets/compose/26s-w1-c1-05.yaml, up, -d, --wait]
    working_dir: .
    timeout_seconds: 300
  stop:
    argv: [docker, compose, -f, targets/compose/26s-w1-c1-05.yaml, down, --remove-orphans]
    working_dir: .
    timeout_seconds: 180
  reset:
    argv: [docker, compose, -f, targets/compose/26s-w1-c1-05.yaml, down, --volumes, --remove-orphans]
    working_dir: .
    timeout_seconds: 180
  backend_regression:
    argv: [docker, compose, --profile, test, -f, targets/compose/26s-w1-c1-05.yaml, run, --rm, --no-deps, test]
    working_dir: .
    timeout_seconds: 900
tool_versions:
  docker: "29.6.1"
  docker-compose: "v5.3.0"
  java: "17"
  gradle: "8.14"
  node: "22"
healthcheck:
  path: /api/health
  expected_status: 200
  timeout_seconds: 60
reset:
  command_id: reset
  snapshot_name: local-mysql-ephemeral-v1
role_fixtures:
  - name: scrum_helper_local_runtime
    description: Local MySQL and ignored runtime credentials; Gemini integrations remain in source fallback mode.
    secret_env_names:
      [VIBECUTTER_26S_W1_C1_05_DB_PASSWORD, VIBECUTTER_26S_W1_C1_05_ROOT_PASSWORD, VIBECUTTER_26S_W1_C1_05_JWT_SECRET]
test_suites:
  - name: spring-h2-regression
    command_id: backend_regression
log_paths: []
docker_isolation:
  compose_file: targets/compose/26s-w1-c1-05.yaml
  internal_network: vibecutter-internal
  require_loopback_port_bindings: true
