manifest_version: 1
id: 26s-w1-c2-04
display_name: 26s-w1-c2-04 local isolated runtime
adapter: fastapi
source_dir: .vibecutter/targets/sources/26s-w1-c2-04
base_url: http://127.0.0.1:14017
commands:
  build: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-04.yaml, build], working_dir: ., timeout_seconds: 1800}
  start: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-04.yaml, up, -d, --wait], working_dir: ., timeout_seconds: 360}
  stop: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-04.yaml, down, --remove-orphans], working_dir: ., timeout_seconds: 180}
  reset: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-04.yaml, down, --volumes, --remove-orphans], working_dir: ., timeout_seconds: 180}
  prepare_idor_fixture: {argv: [py, "-3.13", targets/scripts/26s-w1-c2-04-idor-fixture.py], working_dir: ., timeout_seconds: 60}
tool_versions: {docker: "29.6.1", docker-compose: "v5.3.0", python: "3.13", node: "22", sqlite: "3"}
healthcheck: {path: /api/data, expected_status: 200, timeout_seconds: 90}
reset: {command_id: reset, snapshot_name: local-sqlite-ephemeral-v1}
role_fixtures:
  - name: wordnote_local_sqlite
    description: Fresh API container creates the source SQLite schema and seeded shared vocabularies in its ephemeral filesystem.
    secret_env_names: []
  - name: idor_owner_user_a
    description: prepare_idor_fixture creates a fresh local owner and a private vocabulary/word. Its ID and safe victim marker are written only to the gitignored fixture metadata file.
    secret_env_names: []
  - name: idor_attacker_user_b
    description: prepare_idor_fixture creates a distinct local user with its own vocabulary/word. This target currently uses identifier-only endpoints and does not issue an authorization token.
    secret_env_names: []
test_suites: []
log_paths: []
docker_isolation: {compose_file: targets/compose/26s-w1-c2-04.yaml, internal_network: vibecutter-internal, require_loopback_port_bindings: true}
