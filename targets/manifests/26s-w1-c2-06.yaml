manifest_version: 1
id: 26s-w1-c2-06
display_name: 26s-w1-c2-06 local isolated runtime
adapter: generic-docker
source_dir: .vibecutter/targets/sources/26s-w1-c2-06
base_url: http://127.0.0.1:14021
commands:
  build: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-06.yaml, build], working_dir: ., timeout_seconds: 1800}
  start: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-06.yaml, up, -d, --wait], working_dir: ., timeout_seconds: 480}
  stop: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-06.yaml, down, --remove-orphans], working_dir: ., timeout_seconds: 180}
  reset: {argv: [docker, compose, -f, targets/compose/26s-w1-c2-06.yaml, down, --volumes, --remove-orphans], working_dir: ., timeout_seconds: 180}
tool_versions: {docker: "29.6.1", docker-compose: "v5.3.0", python: "3.13", node: "22", postgres: "16", redis: "7"}
healthcheck: {path: /api/csrf/, expected_status: 200, timeout_seconds: 180}
reset: {command_id: reset, snapshot_name: local-postgres-redis-ephemeral-v1}
role_fixtures:
  - name: codebee_local_postgres_redis
    description: Fresh local PostgreSQL schema uses Django migrate --run-syncdb; Redis provides ephemeral Channels and game state.
    secret_env_names: []
test_suites: []
log_paths: []
docker_isolation: {compose_file: targets/compose/26s-w1-c2-06.yaml, internal_network: vibecutter-internal, require_loopback_port_bindings: true}
