manifest_version: 1
id: 26s-w1-c1-01
display_name: 26s-w1-c1-01 local isolated runtime
adapter: generic-docker
source_dir: .vibecutter/targets/sources/26s-w1-c1-01
base_url: http://127.0.0.1:14001
commands:
  build:
    argv: [docker, compose, -f, targets/compose/26s-w1-c1-01.yaml, build]
    working_dir: .
    timeout_seconds: 1800
  start:
    argv: [docker, compose, -f, targets/compose/26s-w1-c1-01.yaml, up, -d, --wait]
    working_dir: .
    timeout_seconds: 300
  stop:
    argv: [docker, compose, -f, targets/compose/26s-w1-c1-01.yaml, down, --remove-orphans]
    working_dir: .
    timeout_seconds: 180
  reset:
    argv: [docker, compose, -f, targets/compose/26s-w1-c1-01.yaml, down, --volumes, --remove-orphans]
    working_dir: .
    timeout_seconds: 180
tool_versions:
  docker: "29.6.1"
  docker-compose: "v5.3.0"
healthcheck:
  path: /health
  expected_status: 200
  timeout_seconds: 30
reset:
  command_id: reset
  snapshot_name: local-postgres-ephemeral-v1
log_paths: []
docker_isolation:
  compose_file: targets/compose/26s-w1-c1-01.yaml
  internal_network: vibecutter-internal
  require_loopback_port_bindings: true
