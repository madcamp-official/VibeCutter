manifest_version: 1
id: 26s-w1-c3-09
display_name: 26s-w1-c3-09 local isolated runtime
adapter: spring-boot
source_dir: .vibecutter/targets/sources/26s-w1-c3-09/backend/server
base_url: http://127.0.0.1:14036
commands:
  build: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-09.yaml, build], working_dir: ., timeout_seconds: 2400}
  start: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-09.yaml, up, -d, --wait], working_dir: ., timeout_seconds: 480}
  stop: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-09.yaml, down, --remove-orphans], working_dir: ., timeout_seconds: 180}
  reset: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-09.yaml, down, --volumes, --remove-orphans], working_dir: ., timeout_seconds: 180}
  smoke: {argv: [py, "-3.13", targets/scripts/26s-w1-c3-09-smoke.py], working_dir: ., timeout_seconds: 60}
tool_versions: {docker: "29.6.1", docker-compose: "v5.3.0", java: "17", gradle: "8.14", mysql: "8.4", node: "22", nginx: "1.27-alpine", python: "3.13"}
healthcheck: {path: /api/health, expected_status: 200, timeout_seconds: 180}
reset: {command_id: reset, snapshot_name: local-mysql-schema-fixture-v1}
role_fixtures:
  - name: madfinder_seed_user
    description: Fresh MySQL schema is initialized from source DDL with a P2 local user and known game. Tier save smoke never calls the Roblox or YouTube APIs.
    secret_env_names: []
test_suites:
  - name: madfinder-api-ui-smoke
    command_id: smoke
log_paths: []
docker_isolation: {compose_file: targets/compose/26s-w1-c3-09.yaml, internal_network: vibecutter-internal, require_loopback_port_bindings: true}
