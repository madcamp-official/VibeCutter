manifest_version: 1
id: 26s-w1-c3-04
display_name: 26s-w1-c3-04 local isolated runtime
adapter: node
source_dir: .vibecutter/targets/sources/26s-w1-c3-04
base_url: http://127.0.0.1:14028
commands:
  build: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-04.yaml, build], working_dir: ., timeout_seconds: 1800}
  start: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-04.yaml, up, -d, --wait], working_dir: ., timeout_seconds: 480}
  stop: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-04.yaml, down, --remove-orphans], working_dir: ., timeout_seconds: 180}
  reset: {argv: [docker, compose, -f, targets/compose/26s-w1-c3-04.yaml, down, --volumes, --remove-orphans], working_dir: ., timeout_seconds: 180}
  smoke: {argv: [py, "-3.13", targets/scripts/26s-w1-c3-04-smoke.py], working_dir: ., timeout_seconds: 60}
tool_versions: {docker: "29.6.1", docker-compose: "v5.3.0", node: "22", mysql: "8.0", nginx: "1.27-alpine", python: "3.13"}
healthcheck: {path: /api/devices, expected_status: 201, timeout_seconds: 180}
reset: {command_id: reset, snapshot_name: local-mysql-seeded-v1}
role_fixtures:
  - name: stockshorts_local_device
    description: X-Device-Id header creates an ephemeral local Device row; company/sector seed data comes from source SQL. RSS, Gemini, and KIS integrations are unavailable under egress blocking.
    # RSS/KIS/Gemini calls are disabled by isolated-runtime configuration.
    secret_env_names: []
test_suites:
  - name: stockshorts-api-smoke
    command_id: smoke
log_paths: []
docker_isolation: {compose_file: targets/compose/26s-w1-c3-04.yaml, internal_network: vibecutter-internal, require_loopback_port_bindings: true}
