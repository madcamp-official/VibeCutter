# command_id -> typed args 스키마 매핑 (shell 문자열 직접 입력 금지, subprocess shell=False).
# 실제 command template(어떤 프로세스를 어떻게 실행할지)은 adapter(P2)가 정의한다.
# 여기 commands.yaml은 "이 command_id로 어떤 타입의 인자를 받을 수 있는가"만 정책으로 고정한다.
#
# 형식 예시 (아직 adapter가 없어 비워둔다):
# commands:
#   docker-compose-up:
#     args:
#       target_id: str
commands: {}
