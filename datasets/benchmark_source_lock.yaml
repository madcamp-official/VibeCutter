# Benchmark source lock (P4 / Model·Eval 소유) — M1 ablation 전용.
#
# ⚠️ targets/source-lock.yaml 과 **분리**된 별도 파일이다. targets/source-lock 은
#    "runtime manifest 와 ID 가 정확히 일치"해야 하는 계약(runtime.source_lock,
#    test_source_lock_contract)이라, manifest 없는 공개 벤치 앱을 거기 넣으면 registry
#    테스트가 FAIL 한다(P2 2026-07-22 실측). 그래서 벤치 소스는 여기서 고정한다.
#
# 용도: M1(클래스별 우선순위 ablation)은 앱을 **실행하지 않고** 소스만 정적 스캔(semgrep)
#    + RAG(code_index) + 235B rerank 한 뒤 inventory_benchmark.yaml 정답과 대조한다.
#    → 필요한 건 소스 체크아웃뿐. build/start/test_suite/manifest 불필요.
#
# 계약: id 는 datasets/inventory_benchmark.yaml 의 app id 와 1:1. repository 도 그 yaml 의
#    repo_url 과 동일. revision 은 40-hex 전체 SHA(2026-07-22 각 repo HEAD 고정). 재현성을
#    위해 bootstrap 은 이 revision 으로 checkout 한다.
#
# 우선순위(P2 로컬에 우선 준비된 6개, 3군 전부 커버): dsvw, dvwa, vampi, dvga,
#    juice-shop, 26s-w1-c2-05(음성 정답). 나머지 10개는 여력 될 때.

