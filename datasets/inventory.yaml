# Vibe Cutter — Target App Inventory (P4 / Model·Eval 소유)
#
# 감사 대상: GitHub org `madcamp-official` 의 몰입캠프 학생 프로젝트 중 "웹앱".
# (모바일 Flutter / 게임 Unity·Godot / 빈 레포는 제외. 벤치마크용 OWASP 공개앱은
#  inventory_benchmark.yaml 참조.)
#
# 이 파일은 자동 분류(git tree 시그니처)로 만든 **분류 카탈로그**다. 여기서 앱을
# 고르지 않는다 — 어떤 앱이 실제로 빌드·기동되는지는 P2 가 전 레포에 health check 를
# 돌려 판정한다. 전부 verify=true(stack/adapter 는 추정값이라 실제 확인 전).
#
# ─────────────────────────────────────────────────────────────────────────────
# 계약 주의 (cowork_rule.md 3·5절, docs/handoffs/D1-P1.md):
#   - `id` = contracts.schemas.Target.id = P2 manifest id (동일 문자열 계약).
#     여기서는 repo 이름을 소문자화한 값을 id 로 쓴다.
#   - `adapter` 는 P2 소유 영역에 대한 "제안". 최종 결정은 P2.
#     python 은 fastapi adapter 로 제안했으나 실제 프레임워크(fastapi/flask)는
#     verify 대상. django/go/php 등은 generic_docker.
#
# 필드 정의는 inventory_benchmark.yaml 헤더 및 datasets/README.md 참조.
# focus ⊆ {idor, xss, injection}. 미감사 앱이라 expected_vulns 는 비움(추정 금지).
# stack 뒤 "≈"/verify=true 는 자동 분류값이라 사람이 확인해야 함을 뜻한다.
# ─────────────────────────────────────────────────────────────────────────────

